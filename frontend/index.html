<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Data Chatbot</title>

    <!-- ✅ Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- ✅ Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- 🔷 Header -->
<div id="header">
    <h2>🤖 AI Data Chatbot</h2>
</div>

<!-- 💬 Chat Area -->
<div id="chat"></div>

<!-- ⌨️ Input Area -->
<div id="inputArea">
    <input 
        type="text" 
        id="query" 
        placeholder="Ask about loans, customers, charts..." 
        autocomplete="off"
    />
    <button onclick="send()">Send</button>
</div>

<!-- ⚡ Script -->
<script src="script.js"></script>

</body>
</html>
